services:
  urlshorter:
    image: urlshorter
    container_name: urlshorter_app
    build:
      context: .
      dockerfile: UrlShorter/Dockerfile
    environment:
      - ConnectionStrings__DbConnection=Host=db;Database=url_shorter;Username=admin;Password=admin
    ports:
      - "8080:8080"
      
  db:
    image: postgres:latest
    container_name: urlshorter_db
    restart: on-failure
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: url_shorter
    volumes:
      - ./dbstorage:/var/lib/postgresql/data/18/main
    ports:
      - "5050:5050"
  